<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>NerveNeutral™</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f7f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
        }

        .wordmark {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
        }

        .tm {
            font-size: 0.45em;
            vertical-align: super;
            font-weight: 300;
            letter-spacing: 0;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: #c8c4be;
            margin: 0 auto 1.5rem;
        }

        .tagline {
            font-size: 0.95rem;
            font-weight: 300;
            color: #6b6560;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .cta {
            font-size: 0.95rem;
            font-weight: 300;
            color: #6b6560;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .email a {
            font-size: 0.9rem;
            font-weight: 400;
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #c8c4be;
            padding-bottom: 2px;
            transition: border-color 0.2s ease;
        }

        .email a:hover {
            border-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="wordmark">NerveNeutral<span class="tm">™</span></h1>
        <div class="divider"></div>
        <p class="tagline">Australian therapeutic apparel</p>
        <p class="cta">IP licensing enquiries only</p>
        <p class="email"><a href="mailto:tony@nerveneutral.com.au">tony@nerveneutral.com.au</a></p>
    </div>
</body>
</html>
